name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Create zip for Nekoweb
        run: cd _site && zip -r ../site.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: site-zip
          path: site.zip

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-nekoweb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-zip
      - name: Upload to Nekoweb
        env:
          NEKOWEB_API_KEY: ${{ secrets.NEKOWEB_API_KEY }}
        run: |
          UPLOAD_ID=$(curl -sf -H "Authorization: $NEKOWEB_API_KEY" \
            https://nekoweb.org/api/files/big/create | jq -r '.id')

          curl -sf -X POST \
            -H "Authorization: $NEKOWEB_API_KEY" \
            -F "id=$UPLOAD_ID" \
            -F "file=@site.zip" \
            https://nekoweb.org/api/files/big/append

          curl -sf -X POST \
            -H "Authorization: $NEKOWEB_API_KEY" \
            --data-urlencode "id=$UPLOAD_ID" \
            --data-urlencode "path=/" \
            https://nekoweb.org/api/files/import/$UPLOAD_ID
