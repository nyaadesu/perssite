  <rect x="18" y="22" width="36" height="4"  fill="#cc4444"/>
  <rect x="20" y="26" width="28" height="3"  fill="#cc4444"/>
  <!-- hot spot / specular flash -->
  <rect x="22" y="22" width="16" height="3"  fill="#f0b0b0"/>
  <rect x="24" y="24" width="10" height="2"  fill="#fce0e0"/>
  <!-- secondary shine on side -->
  <rect x="58" y="24" width="12" height="3"  fill="#cc4444"/>
  <rect x="60" y="24" width="6"  height="2"  fill="#f0b0b0"/>

  <!-- ══ BANG HIGHLIGHTS ══ -->
  <rect x="14" y="32" width="50" height="6"  fill="#aa3030"/>
  <rect x="16" y="33" width="30" height="3"  fill="#cc4444"/>
  <rect x="18" y="33" width="14" height="2"  fill="#f0b0b0"/>
  <!-- wispy fringe -->
  <rect x="10" y="46" width="10" height="5"  fill="#6b1414"/>
  <rect x="24" y="48" width="7"  height="4"  fill="#6b1414"/>
  <rect x="40" y="50" width="6"  height="3"  fill="#6b1414"/>
  <rect x="54" y="50" width="6"  height="3"  fill="#6b1414"/>
  <rect x="69" y="48" width="7"  height="4"  fill="#6b1414"/>
  <rect x="80" y="46" width="10" height="5"  fill="#6b1414"/>

