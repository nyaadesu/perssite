  <rect x="10" y="30" width="80" height="18" fill="#6b1414"/>
  <rect x="14" y="32" width="72" height="12" fill="#8b2020"/>
  <rect x="16" y="33" width="44" height="6"  fill="#aa3030"/>
  <rect x="18" y="33" width="20" height="3"  fill="#cc4444"/>
  <rect x="20" y="33" width="10" height="2"  fill="#f0b0b0"/>
  <rect x="10" y="46" width="10" height="5"  fill="#6b1414"/>
  <rect x="24" y="48" width="7"  height="4"  fill="#6b1414"/>
  <rect x="40" y="50" width="6"  height="3"  fill="#6b1414"/>
  <rect x="54" y="50" width="6"  height="3"  fill="#6b1414"/>
  <rect x="69" y="48" width="7"  height="4"  fill="#6b1414"/>
  <rect x="80" y="46" width="10" height="5"  fill="#6b1414"/>

  <!-- ══ 2000s ANIME EYES ══ -->
  <!-- LEFT eye (x=14–46) -->
  <!-- upper lash — thick, extends past iris (era signature) -->
  <rect x="12" y="53" width="36" height="5"  fill="#191919"/>
  <rect x="12" y="58" width="8"  height="4"  fill="#191919"/>
  <!-- eyelid shadow (purple tint, very 2000s) -->
  <rect x="16" y="58" width="28" height="3"  fill="#7060a0"/>
  <!-- iris outer dark ring -->
  <rect x="16" y="57" width="28" height="20" fill="#203848"/>
  <!-- iris shadow top (under lash) -->
  <rect x="18" y="59" width="24" height="5"  fill="#2a5070"/>
  <!-- iris main colour -->
  <rect x="18" y="64" width="24" height="8"  fill="#6aaec8"/>
  <!-- iris bottom highlight (lighter, era style) -->
  <rect x="18" y="72" width="24" height="3"  fill="#a8d8ec"/>
  <!-- pupil -->
  <rect x="22" y="58" width="16" height="20" fill="#0a1420"/>
  <!-- BIG teardrop catchlight (top-right, era signature) -->
  <rect x="30" y="58" width="10" height="8"  fill="#ffffff"/>
  <rect x="32" y="66" width="6"  height="3"  fill="#e0f2fc"/>
  <!-- tiny secondary catchlight (bottom left) -->
  <rect x="18" y="74" width="4"  height="3"  fill="#ffffff"/>
  <!-- lower lash -->
  <rect x="16" y="76" width="28" height="2"  fill="#191919"/>
  <!-- lower lash ticks (era detail) -->
  <rect x="18" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="24" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="30" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="36" y="78" width="2"  height="2"  fill="#191919"/>

  <!-- RIGHT eye (x=54–86) -->
  <rect x="52" y="53" width="36" height="5"  fill="#191919"/>
  <rect x="80" y="58" width="8"  height="4"  fill="#191919"/>
  <rect x="56" y="58" width="28" height="3"  fill="#7060a0"/>
  <rect x="56" y="57" width="28" height="20" fill="#203848"/>
  <rect x="58" y="59" width="24" height="5"  fill="#2a5070"/>
  <rect x="58" y="64" width="24" height="8"  fill="#6aaec8"/>
  <rect x="58" y="72" width="24" height="3"  fill="#a8d8ec"/>
  <rect x="62" y="58" width="16" height="20" fill="#0a1420"/>
  <rect x="68" y="58" width="10" height="8"  fill="#ffffff"/>
  <rect x="70" y="66" width="6"  height="3"  fill="#e0f2fc"/>
  <rect x="76" y="74" width="4"  height="3"  fill="#ffffff"/>
  <rect x="56" y="76" width="28" height="2"  fill="#191919"/>
  <rect x="58" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="64" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="70" y="78" width="2"  height="2"  fill="#191919"/>
  <rect x="76" y="78" width="2"  height="2"  fill="#191919"/>

  <!-- ══ SPARKLE ACCENTS (era must-have) ══ -->
  <!-- top left -->
  <rect x="8"  y="54" width="2"  height="2"  fill="#ffffff"/>
  <rect x="7"  y="55" width="4"  height="0"  fill="#ffffff"/>
  <rect x="9"  y="53" width="0"  height="4"  fill="#ffffff"/>
  <!-- top right -->
  <rect x="90" y="56" width="2"  height="2"  fill="#ffffff"/>
  <rect x="89" y="57" width="4"  height="0"  fill="#ffffff"/>

  <!-- ══ MOUTH ══ -->
  <rect x="38" y="88" width="24" height="3"  fill="#c08888"/>
  <rect x="40" y="91" width="20" height="2"  fill="#a07070"/>

  <!-- ══ STRIPE TOP ══ -->
  <rect x="0"  y="95" width="100" height="3" fill="#1a3fa0"/>
  <rect x="0"  y="98" width="100" height="2" fill="#0d1a40"/>

  <!-- border -->
  <rect x="0"  y="0"  width="100" height="2" fill="#444"/>
  <rect x="0"  y="98" width="100" height="2" fill="#444"/>
  <rect x="0"  y="0"  width="2"  height="100" fill="#444"/>
  <rect x="98" y="0"  width="2"  height="100" fill="#444"/>
</svg>
