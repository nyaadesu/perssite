  <rect y="60" width="100" height="20" fill="#f7a8b8"/>
  <rect y="80" width="100" height="20" fill="#55cdfc"/>

  <!-- ══ BOW — angular diamond wings ══ -->
  <!-- left wing: diamond shape, pointed at left tip, straight on right -->
  <rect x="28" y="2"  width="14" height="20" fill="#191919"/>
  <rect x="20" y="4"  width="22" height="16" fill="#191919"/>
  <rect x="14" y="6"  width="28" height="12" fill="#191919"/>
  <rect x="8"  y="8"  width="34" height="8"  fill="#191919"/>
  <rect x="4"  y="10" width="38" height="4"  fill="#191919"/>
  <!-- left wing edge highlight lines -->
  <rect x="28" y="2"  width="14" height="2"  fill="#484848"/>
  <rect x="20" y="4"  width="8"  height="2"  fill="#484848"/>
  <rect x="28" y="20" width="14" height="2"  fill="#484848"/>
  <rect x="20" y="18" width="8"  height="2"  fill="#484848"/>
  <!-- left wing inner shine -->
  <rect x="22" y="7"  width="12" height="4"  fill="#383838"/>
  <rect x="24" y="7"  width="6"  height="3"  fill="#505050"/>

  <!-- right wing: mirror -->
  <rect x="58" y="2"  width="14" height="20" fill="#191919"/>
  <rect x="58" y="4"  width="22" height="16" fill="#191919"/>
  <rect x="58" y="6"  width="28" height="12" fill="#191919"/>
  <rect x="58" y="8"  width="34" height="8"  fill="#191919"/>
  <rect x="58" y="10" width="38" height="4"  fill="#191919"/>
  <!-- right wing edges -->
  <rect x="58" y="2"  width="14" height="2"  fill="#484848"/>
  <rect x="72" y="4"  width="8"  height="2"  fill="#484848"/>
  <rect x="58" y="20" width="14" height="2"  fill="#484848"/>
  <rect x="72" y="18" width="8"  height="2"  fill="#484848"/>
  <!-- right wing shine -->
  <rect x="66" y="7"  width="12" height="4"  fill="#383838"/>
  <rect x="70" y="7"  width="6"  height="3"  fill="#505050"/>

  <!-- center knot -->
  <rect x="41" y="5"  width="18" height="14" fill="#2e2e2e"/>
  <rect x="43" y="7"  width="14" height="10" fill="#404040"/>
  <rect x="46" y="9"  width="8"  height="6"  fill="#505050"/>
  <rect x="47" y="9"  width="4"  height="2"  fill="#686868"/>

  <!-- tails -->
  <rect x="36" y="20" width="10" height="8"  fill="#191919"/>
  <rect x="34" y="24" width="8"  height="4"  fill="#191919"/>
  <rect x="54" y="20" width="10" height="8"  fill="#191919"/>
  <rect x="58" y="24" width="8"  height="4"  fill="#191919"/>

  <!-- ══ HAIR BASE ══ -->
  <rect x="12" y="18" width="76" height="10" fill="#6b1414"/>
  <rect x="8"  y="24" width="84" height="8"  fill="#6b1414"/>
  <!-- sides -->
  <rect x="4"  y="30" width="16" height="68" fill="#6b1414"/>
  <rect x="80" y="30" width="16" height="68" fill="#6b1414"/>
  <!-- bangs base -->
  <rect x="10" y="30" width="80" height="18" fill="#6b1414"/>

  <!-- ══ HAIR MID TONE ══ -->
  <rect x="14" y="20" width="60" height="8"  fill="#8b2020"/>
  <rect x="10" y="26" width="80" height="6"  fill="#8b2020"/>
  <rect x="12" y="32" width="76" height="12" fill="#8b2020"/>
  <rect x="6"  y="36" width="8"  height="52" fill="#8b2020"/>
  <rect x="86" y="36" width="8"  height="52" fill="#8b2020"/>

