  <rect x="16" y="30" width="68" height="52" fill="#f5dcc8"/>
  <rect x="18" y="82" width="64" height="6"  fill="#f5dcc8"/>
  <rect x="22" y="88" width="56" height="4"  fill="#f5dcc8"/>
  <rect x="26" y="92" width="48" height="4"  fill="#f5dcc8"/>
  <rect x="30" y="96" width="40" height="2"  fill="#f5dcc8"/>
