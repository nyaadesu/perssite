<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="75" height="75" shape-rendering="crispEdges">
  <!-- Trans flag bg -->
  <rect width="100" height="100" fill="#fff"/>
  <rect y="0"  width="100" height="20" fill="#55cdfc"/>
  <rect y="20" width="100" height="20" fill="#f7a8b8"/>
